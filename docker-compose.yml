services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: eternaldiscord:local
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Storage__Path: /app/data/eternaldiscord.db
      Proxy__TrustForwardedHeaders: "true"
      Ai__DefaultProvider: ${AI_DEFAULT_PROVIDER:-claude}
      Ai__Providers__claude__ApiKey: ${ANTHROPIC_API_KEY:-}
      Ai__Providers__openai__ApiKey: ${OPENAI_API_KEY:-}
      Ai__Providers__xai__ApiKey: ${XAI_API_KEY:-}
      Ai__Providers__huggingface__ApiKey: ${HUGGINGFACE_API_KEY:-}
      Authentication__Providers__google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Authentication__Providers__google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Authentication__Providers__microsoft__ClientId: ${MICROSOFT_CLIENT_ID:-}
      Authentication__Providers__microsoft__ClientSecret: ${MICROSOFT_CLIENT_SECRET:-}
      Authentication__Providers__github__ClientId: ${GITHUB_CLIENT_ID:-}
      Authentication__Providers__github__ClientSecret: ${GITHUB_CLIENT_SECRET:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - eternaldiscord-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command: ["http", "app:8080"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?NGROK_AUTHTOKEN is required}
    ports:
      - "${NGROK_INSPECTOR_PORT:-4040}:4040"

volumes:
  eternaldiscord-data:
